<script>
    const mobileMenu = document.getElementById('mobile-menu');
    const menuButton = document.getElementById('mobile-menu-button');
    const header = document.querySelector('header');

    // Mobile menu toggle
    if (menuButton) {
        menuButton.addEventListener('click', () => {
            mobileMenu?.classList.toggle('hidden');
        });
    }

    // Smooth scrolling for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                target.scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
                mobileMenu?.classList.add('hidden');
            }
        });
    });

    // Scroll spy for nav links pointing to sections on this page
    const navLinks = document.querySelectorAll('[data-nav-link][href^="#"]');
    const linkedSections = Array.from(navLinks)
        .map(link => document.querySelector(link.getAttribute('href')))
        .filter(Boolean);

    const setActiveNavLink = (sectionId) => {
        navLinks.forEach(link => {
            const linkTarget = link.getAttribute('href');
            if (linkTarget === `#${sectionId}`) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    };

    const handleScrollSpy = () => {
        if (!linkedSections.length) return;

        const headerOffset = (header?.offsetHeight || 0) + 8;
        const viewportPosition = window.scrollY + headerOffset;
        let activeSectionId = null;

        for (const section of linkedSections) {
            const sectionTop = section.offsetTop;
            const sectionBottom = sectionTop + section.offsetHeight;
            if (viewportPosition >= sectionTop && viewportPosition < sectionBottom) {
                activeSectionId = section.id;
                break;
            }
        }

        if (!activeSectionId && window.scrollY + window.innerHeight >= document.body.offsetHeight - 2) {
            activeSectionId = linkedSections[linkedSections.length - 1]?.id || null;
        }

        if (activeSectionId) {
            setActiveNavLink(activeSectionId);
        } else {
            navLinks.forEach(link => link.classList.remove('active'));
        }
    };

    window.addEventListener('scroll', handleScrollSpy, { passive: true });
    window.addEventListener('resize', handleScrollSpy);
    window.addEventListener('load', handleScrollSpy);
</script>
