<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md shadow-soft">
    <div class="container py-4">
        <div class="flex items-center justify-between">
            <a href="{{ relativePrefix }}" class="flex items-center gap-3">
                <img src="/logos/okdp-notext.svg" alt="OKDP Logo" class="h-10 w-auto">
                <span class="hidden lg:block text-xl font-bold">Open Kubernetes Data Platform</span>
                <span class="lg:hidden text-xl font-bold">OKDP</span>
            </a>
            <nav class="hidden md:block">
                <ul class="flex items-center gap-6">
                    <li><a href="{{ relativePrefix }}#about" class="nav-link" data-nav-link>{{ nav.about }}</a></li>
                    <li><a href="{{ relativePrefix }}#architecture" class="nav-link" data-nav-link>{{ nav.architecture }}</a></li>
                    <li><a href="{{ roadmapUrl }}" class="nav-link" data-nav-link>{{ nav.roadmap }}</a></li>
                    <li><a href="{{ relativePrefix }}#community" class="nav-link" data-nav-link>{{ nav.community }}</a></li>
                    <li>
                        <div
                            class="flex items-center gap-2 px-2 py-1 bg-gray-100 rounded-full border border-gray-200">
                            <a href="{{ frUrl }}"
                                class="flex items-center justify-center w-6 h-6 rounded-full overflow-hidden transition-all {{#if (eq currentLang 'fr')}}ring-2 ring-primary ring-offset-1{{else}}opacity-50 hover:opacity-100{{/if}}"
                                aria-label="Français">
                                <img src="{{ relativePrefix }}public/flags/fr.svg" alt="FR"
                                    class="w-full h-full object-cover">
                            </a>
                            <a href="{{ enUrl }}"
                                class="flex items-center justify-center w-6 h-6 rounded-full overflow-hidden transition-all {{#if (eq currentLang 'en')}}ring-2 ring-primary ring-offset-1{{else}}opacity-50 hover:opacity-100{{/if}}"
                                aria-label="English">
                                <img src="{{ relativePrefix }}public/flags/gb.svg" alt="EN"
                                    class="w-full h-full object-cover">
                            </a>
                        </div>
                    </li>
                    <li><a href="https://github.com/OKDP/" class="nav-link" aria-label="GitHub">
                            <svg class="h-5 w-5 mr-2" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg"
                                role="img" aria-hidden="true">
                                <path fill="currentColor"
                                    d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z">
                                </path>
                            </svg>
                        </a></li>
                </ul>
            </nav>
            <button class="md:hidden p-2" aria-label="Menu" id="mobile-menu-button">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="md:hidden hidden pt-4 pb-2">
            <ul class="flex flex-col gap-4">
                <li><a href="{{ relativePrefix }}#about" class="block py-2 px-4 hover:bg-accent rounded-lg transition-colors"
                        data-nav-link>{{ nav.about }}</a></li>
                <li><a href="{{ relativePrefix }}#architecture" class="block py-2 px-4 hover:bg-accent rounded-lg transition-colors"
                        data-nav-link>{{ nav.architecture }}</a></li>
                <li><a href="{{ roadmapUrl }}" class="block py-2 px-4 hover:bg-accent rounded-lg transition-colors"
                        data-nav-link>{{ nav.roadmap }}</a></li>
                <li><a href="{{ relativePrefix }}#community" class="block py-2 px-4 hover:bg-accent rounded-lg transition-colors"
                        data-nav-link>{{ nav.community }}</a></li>
                <li>
                    <div class="flex items-center gap-4 px-4 py-2">
                        <span class="text-text-light font-medium">Language:</span>
                        <div class="flex items-center gap-3">
                            <a href="{{ frUrl }}"
                                class="flex items-center justify-center w-8 h-8 rounded-full overflow-hidden transition-all {{#if (eq currentLang 'fr')}}ring-2 ring-primary ring-offset-2{{else}}opacity-50 hover:opacity-100{{/if}}"
                                aria-label="Français">
                                <img src="{{ relativePrefix }}public/flags/fr.svg" alt="FR"
                                    class="w-full h-full object-cover">
                            </a>
                            <a href="{{ enUrl }}"
                                class="flex items-center justify-center w-8 h-8 rounded-full overflow-hidden transition-all {{#if (eq currentLang 'en')}}ring-2 ring-primary ring-offset-2{{else}}opacity-50 hover:opacity-100{{/if}}"
                                aria-label="English">
                                <img src="{{ relativePrefix }}public/flags/gb.svg" alt="EN"
                                    class="w-full h-full object-cover">
                            </a>
                        </div>
                    </div>
                </li>
                <li><a href="https://github.com/OKDP/"
                        class="flex items-center py-2 px-4 hover:bg-accent rounded-lg transition-colors">
                        <svg class="h-5 w-5 mr-2" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
                            <path fill="currentColor"
                                d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z">
                            </path>
                        </svg>
                        GitHub
                    </a></li>
            </ul>
        </div>
    </div>
</header>
